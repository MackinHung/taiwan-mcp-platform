name: Publish remaining npm packages

on:
  workflow_dispatch:
  schedule:
    # Run daily at 14:00 UTC (22:00 Taiwan) until all are published
    - cron: '0 14 * * *'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish remaining packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            taiwan-announce
            taiwan-foreign-trade
            taiwan-gazette
            taiwan-insurance-calc
            taiwan-invoice
            taiwan-judgment
            taiwan-labor
            taiwan-law
            taiwan-legislative
            taiwan-local-announce
            taiwan-movie
            taiwan-museum
            taiwan-news
            taiwan-oil-price
            taiwan-parking
            taiwan-patent
            taiwan-procurement
            taiwan-radiation
            taiwan-reservoir
            taiwan-sports
            taiwan-stock
            taiwan-tax
            taiwan-tourism
            taiwan-traffic-accident
            taiwan-transit
            taiwan-validator
            taiwan-water-quality
            taiwan-weather-alert
            taiwan-youbike
          )

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          RATE_LIMITED=0

          for pkg in "${PACKAGES[@]}"; do
            echo "=== $pkg ==="
            DIR="servers/$pkg"

            if [ ! -d "$DIR" ]; then
              echo "SKIP: directory not found"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Check if already published at target version
            PKG_VERSION=$(node -p "require('./$DIR/package.json').version")
            CURRENT=$(npm view "@formosa-mcp/$pkg" version 2>/dev/null || echo "")
            if [ "$CURRENT" = "$PKG_VERSION" ]; then
              echo "SKIP: already at $PKG_VERSION"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Build
            cd "$DIR"
            if ! npm run build 2>&1; then
              echo "FAIL: build error for $pkg"
              FAILED=$((FAILED + 1))
              cd ../..
              continue
            fi

            # Publish with retry on rate limit
            PUBLISHED=false
            for attempt in 1 2 3; do
              OUTPUT=$(npm publish --access public 2>&1)
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 0 ]; then
                echo "OK: $pkg published (attempt $attempt)"
                SUCCESS=$((SUCCESS + 1))
                PUBLISHED=true
                break
              fi
              if echo "$OUTPUT" | grep -q "E429"; then
                echo "RATE LIMITED (attempt $attempt), waiting 60s..."
                RATE_LIMITED=$((RATE_LIMITED + 1))
                sleep 60
              else
                echo "FAIL: $pkg - $OUTPUT"
                FAILED=$((FAILED + 1))
                break
              fi
            done

            if [ "$PUBLISHED" = false ] && [ $RATE_LIMITED -gt 0 ]; then
              echo "FAIL: $pkg (rate limited after retries)"
              FAILED=$((FAILED + 1))
            fi

            cd ../..

            # Spacing between publishes
            sleep 20
          done

          echo ""
          echo "=== SUMMARY ==="
          echo "Published: $SUCCESS"
          echo "Failed: $FAILED"
          echo "Skipped: $SKIPPED"
          echo "Rate limited attempts: $RATE_LIMITED"

          # Don't fail the workflow for rate limits - it will auto-retry via cron
          if [ "$SUCCESS" -gt 0 ] || [ "$SKIPPED" -eq ${#PACKAGES[@]} ]; then
            echo "Progress made or all done."
            exit 0
          fi

          # All failed with no progress
          exit 1
