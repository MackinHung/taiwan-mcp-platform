name = "mcp-gateway"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mcp-platform"
database_id = "<YOUR_D1_DATABASE_ID>"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "<YOUR_KV_RATE_LIMITS_ID>"

[[kv_namespaces]]
binding = "API_KEY_CACHE"
id = "<YOUR_KV_API_KEY_CACHE_ID>"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "<YOUR_KV_SESSION_CACHE_ID>"

[[kv_namespaces]]
binding = "SERVER_CACHE"
id = "<YOUR_KV_SERVER_CACHE_ID>"

[[r2_buckets]]
binding = "PACKAGES"
bucket_name = "mcp-packages"

[vars]
GITHUB_CLIENT_ID = "<YOUR_GITHUB_OAUTH_CLIENT_ID>"
GITHUB_REDIRECT_URI = "https://<YOUR_PAGES_DOMAIN>/api/auth/github/callback"
GOOGLE_CLIENT_ID = "<YOUR_GOOGLE_OAUTH_CLIENT_ID>"
GOOGLE_REDIRECT_URI = "https://<YOUR_PAGES_DOMAIN>/api/auth/google/callback"
FRONTEND_URL = "https://<YOUR_PAGES_DOMAIN>"

[triggers]
crons = ["0 * * * *"]
