name = "mcp-composer"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mcp-platform"
database_id = "<YOUR_D1_DATABASE_ID>"

[[kv_namespaces]]
binding = "TOOL_REGISTRY"
id = "<YOUR_KV_TOOL_REGISTRY_ID>"

[[kv_namespaces]]
binding = "API_KEY_CACHE"
id = "<YOUR_KV_API_KEY_CACHE_ID>"
