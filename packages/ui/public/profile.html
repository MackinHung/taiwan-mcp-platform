<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人資料 — 台灣 MCP 市集</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">🇹🇼 MCP 市集</a>
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="搜尋 MCP 伺服器..." />
      </div>
      <div class="nav-links">
        <a href="/">探索</a>
        <a href="/my-mcp.html" class="hide-mobile">我的 MCP</a>
        <a href="/my-servers.html" class="hide-mobile">我的伺服器</a>
        <a href="/upload.html" class="hide-mobile">上架</a>
        <button id="theme-toggle" class="btn btn-ghost btn-icon" onclick="theme.toggle()">☀️</button>
        <button id="login-btn" class="btn btn-primary btn-sm" onclick="auth.login()">登入</button>
        <div id="user-menu" style="display:none;">
          <a href="/profile.html"><img id="user-avatar" src="" alt="avatar" /></a>
          <span id="user-name"></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container page-content" style="max-width:800px;">
    <div id="profile-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Create API Key Modal -->
  <div class="modal-overlay hidden" id="create-key-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>建立 API Key</h2>
        <button class="modal-close" onclick="profile.closeKeyModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>名稱 *</label>
        <input type="text" id="key-name" placeholder="例：開發測試" />
      </div>
      <div class="form-group">
        <label>權限</label>
        <label class="filter-option"><input type="checkbox" value="read" checked /> 讀取 (查詢伺服器)</label>
        <label class="filter-option"><input type="checkbox" value="compose" checked /> 組合 (管理 MCP 組合)</label>
        <label class="filter-option"><input type="checkbox" value="publish" /> 發布 (上架伺服器)</label>
      </div>
      <div class="form-group">
        <label>有效期限</label>
        <select id="key-expiry">
          <option value="">永不過期</option>
          <option value="30">30 天</option>
          <option value="90">90 天</option>
          <option value="180">180 天</option>
          <option value="365">365 天</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="profile.closeKeyModal()">取消</button>
        <button class="btn btn-primary" onclick="profile.handleCreateKey()">建立</button>
      </div>
    </div>
  </div>

  <!-- Key Created Modal -->
  <div class="modal-overlay hidden" id="key-created-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>API Key 已建立</h2>
        <button class="modal-close" onclick="$('#key-created-modal').classList.add('hidden')">&times;</button>
      </div>
      <div class="alert alert-warning">請立即複製此金鑰，關閉後將無法再次檢視完整金鑰。</div>
      <div class="code-block mt-8">
        <button class="copy-btn" onclick="copyToClipboard(document.getElementById('new-key-value').textContent)">複製</button>
        <code id="new-key-value"></code>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="$('#key-created-modal').classList.add('hidden')">我已複製</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
