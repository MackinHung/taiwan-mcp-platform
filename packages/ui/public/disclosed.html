    <h1>公示期伺服器</h1>
    <div class="info-card" style="margin-bottom:2rem;padding:1.5rem;border-radius:12px;background:var(--card-bg);border:1px solid var(--border);">
      <h3 style="margin-top:0;">什麼是公示期？</h3>
      <p>所有通過自動安全掃描的 MCP 伺服器，在正式上架前需經過 <strong>5 天公示期</strong>（小版本更新為 2 天）。在此期間：</p>
      <ul style="margin:0.5rem 0;">
        <li>社群成員可以檢視原始碼與掃描報告</li>
        <li>任何人都可以投下「信任」或「不信任」票</li>
        <li>可以提交安全回報，若有未解決的安全回報，伺服器將不會自動上架</li>
      </ul>
      <p style="margin-bottom:0;">公示期結束後，沒有安全疑慮的伺服器將自動上架至市集。</p>
    </div>
