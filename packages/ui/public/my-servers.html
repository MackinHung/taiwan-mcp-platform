<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的伺服器 — 台灣 MCP 市集</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">🇹🇼 MCP 市集</a>
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="搜尋 MCP 伺服器..." />
      </div>
      <div class="nav-links">
        <a href="/">探索</a>
        <a href="/my-mcp.html" class="hide-mobile">我的 MCP</a>
        <a href="/my-servers.html" class="active hide-mobile">我的伺服器</a>
        <a href="/upload.html" class="hide-mobile">上架</a>
        <button id="theme-toggle" class="btn btn-ghost btn-icon" onclick="theme.toggle()">☀️</button>
        <button id="login-btn" class="btn btn-primary btn-sm" onclick="auth.login()">登入</button>
        <div id="user-menu" style="display:none;">
          <a href="/profile.html"><img id="user-avatar" src="" alt="avatar" /></a>
          <span id="user-name"></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container page-content" style="max-width:960px;">
    <div class="flex items-center justify-between mb-24">
      <h1 style="font-size:1.5rem;font-weight:700;">我的伺服器</h1>
      <a href="/upload.html" class="btn btn-primary">+ 上架新伺服器</a>
    </div>
    <div id="my-servers-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Version History Modal -->
  <div class="modal-overlay hidden" id="versions-modal">
    <div class="modal" style="max-width:640px;">
      <div class="modal-header">
        <h2 id="versions-modal-title">版本紀錄</h2>
        <button class="modal-close" onclick="myServers.closeVersionsModal()">&times;</button>
      </div>
      <div id="versions-modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="myServers.closeVersionsModal()">關閉</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/my-servers.js"></script>
</body>
</html>
