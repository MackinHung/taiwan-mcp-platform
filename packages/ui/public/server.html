<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>伺服器詳情 — 台灣 MCP 市集</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">🇹🇼 MCP 市集</a>
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="搜尋 MCP 伺服器..." />
      </div>
      <div class="nav-links">
        <a href="/">探索</a>
        <a href="/my-mcp.html" class="hide-mobile">我的 MCP</a>
        <a href="/upload.html" class="hide-mobile">上架</a>
        <button id="theme-toggle" class="btn btn-ghost btn-icon" onclick="theme.toggle()">☀️</button>
        <button id="login-btn" class="btn btn-primary btn-sm" onclick="auth.login()">登入</button>
        <div id="user-menu" style="display:none;">
          <a href="/profile.html"><img id="user-avatar" src="" alt="avatar" /></a>
          <span id="user-name"></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container page-content" id="server-detail">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Report Modal -->
  <div class="modal-overlay hidden" id="report-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>回報問題</h2>
        <button class="modal-close" onclick="serverDetail.closeReportModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>問題類型</label>
        <select id="report-type">
          <option value="inaccurate">資訊不正確</option>
          <option value="security">安全性問題</option>
          <option value="abuse">濫用</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>說明</label>
        <textarea id="report-desc" rows="4" placeholder="請描述問題..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="serverDetail.closeReportModal()">取消</button>
        <button class="btn btn-danger" onclick="serverDetail.submitReport()">送出回報</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/server-detail.js"></script>
</body>
</html>
