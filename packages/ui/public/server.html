          <a href="/profile.html"><img id="user-avatar" src="" alt="avatar" /></a>

      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay" onclick="closeMobileMenu()"></div>
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-close"><button onclick="closeMobileMenu()" aria-label="關閉選單"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>

  <div class="container page-content" id="server-detail">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Report Modal -->
  <div class="modal-overlay hidden" id="report-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>回報問題</h2>
        <button class="modal-close" onclick="serverDetail.closeReportModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>問題類型</label>
        <select id="report-type">
          <option value="inaccurate">資訊不正確</option>
          <option value="security">安全性問題</option>
          <option value="abuse">濫用</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>說明</label>
        <textarea id="report-desc" rows="4" placeholder="請描述問題..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="serverDetail.closeReportModal()">取消</button>
        <button class="btn btn-danger" onclick="serverDetail.submitReport()">送出回報</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>🇹🇼 台灣 MCP 市集</h4>

            <a href="/trust.html">信任與安全</a>
            <a href="/privacy.html">隱私政策</a>
            <a href="/profile.html">API Keys</a>
          </div>
        </div>
        <div class="footer-col">
          <h4>資源</h4>
          <div class="footer-col-links">
